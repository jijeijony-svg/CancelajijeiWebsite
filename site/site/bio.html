<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bio</title>

<style>
  :root{
    --ink: #f2efe9;
    --ink-dim: rgba(242,239,233,0.62);
    --line: rgba(242,239,233,0.4);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    min-height: 100%;
    background: #0c0c0d;
  }

  body{
    font-family: 'Space Mono', 'Courier New', monospace;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 100vh;
    padding: clamp(24px, 6vw, 72px);
  }

  a{
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding-bottom: 2px;
    width: max-content;
  }

  a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--line);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }

  a:hover::after,
  a:focus-visible::after{
    transform: scaleX(1);
  }

  .back{
    text-transform: lowercase;
    font-size: 1rem;
    margin-bottom: 3em;
  }

  /* ============================================================
     EDIT ME — your bio text
     Replace the paragraph below with your own.
     ============================================================ */
  .bio-text{
    max-width: 60ch;
    font-size: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.6;
    color: var(--ink-dim);
  }

  footer{
    margin-top: 3em;
    font-size: 0.7rem;
    color: var(--ink-dim);
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

  <a class="back" href="index.html">&larr; back</a>

  <p class="bio-text">
    Diverse range of eletronic music.
  </p>

  <footer>est. 2026</footer>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

</body>
</html>
