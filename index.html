<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>site</title>

<script>
/* ============================================================
   EDIT ME — your links
   ============================================================ */
const CONFIG = {
  links: {
    bio: "bio.html",                                  
    soundcloud: "https://soundcloud.com/cancela25",
    residentAdvisor: "https://ra.co/dj/cancela",
    contactEmail: "jijeijony@gmail.com"
  },

  /* ============================================================
     EDIT ME — background images
     1. Create a folder called "images" next to this file.
     2. Drop your photos in there.
     3. List the filenames below, e.g. "images/photo1.jpg".
     A random one is shown full-screen every time someone loads the page.
     Leave the list empty to use the plain dark background instead.
     ============================================================ */
  images: [
    // "images/photo1.jpg",
    // "images/photo2.jpg",
    // "images/photo3.jpg",
  ]
};
</script>

<style>
  :root{
    --ink: #f2efe9;
    --ink-dim: rgba(242,239,233,0.62);
    --scrim-top: rgba(8,8,9,0.15);
    --scrim-bottom: rgba(8,8,9,0.65);
    --line: rgba(242,239,233,0.4);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    height: 100%;
    background: #0c0c0d;
  }

  body{
    font-family: 'Space Mono', 'Courier New', monospace;
    color: var(--ink);
    overflow: hidden;
  }

  #bg-layer{
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #0c0c0d;
  }

  #bg-layer img{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: fade-in 1.8s ease forwards, kenburns 40s ease-out forwards;
  }

  @keyframes fade-in{
    to{ opacity: 1; }
  }

  @keyframes kenburns{
    from{ transform: scale(1.06); }
    to{ transform: scale(1); }
  }

  #bg-layer::after{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--scrim-top) 0%, var(--scrim-bottom) 100%);
  }

  main{
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: clamp(24px, 6vw, 72px);
  }

  nav{
    display: flex;
    flex-direction: column;
    gap: 0.65em;
    width: max-content;
  }

  nav a{
    color: var(--ink);
    text-decoration: none;
    font-size: clamp(1.1rem, 2.6vw, 1.6rem);
    text-transform: lowercase;
    letter-spacing: 0.02em;
    position: relative;
    padding-bottom: 2px;
    width: max-content;
  }

  nav a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--line);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }

  nav a:hover::after,
  nav a:focus-visible::after{
    transform: scaleX(1);
  }

  nav a:focus-visible{
    outline: 1px dashed var(--ink);
    outline-offset: 4px;
  }

  footer{
    margin-top: 1.6em;
    font-size: 0.7rem;
    color: var(--ink-dim);
    letter-spacing: 0.03em;
  }

  @media (prefers-reduced-motion: reduce){
    #bg-layer img{
      animation: fade-in 0.6s ease forwards;
    }
  }
</style>
</head>
<body>

<div id="bg-layer"></div>

<main>
  <nav>
    <a id="link-bio" href="#">bio</a>
    <a id="link-soundcloud" href="#" target="_blank" rel="noopener">soundcloud</a>
    <a id="link-ra" href="#" target="_blank" rel="noopener">resident advisor</a>
    <a id="link-contact" href="#">contact</a>
  </nav>
  <footer>est. 2026</footer>
</main>

<script>
  // wire up links from CONFIG
  document.getElementById('link-bio').href = CONFIG.links.bio;
  document.getElementById('link-soundcloud').href = CONFIG.links.soundcloud;
  document.getElementById('link-ra').href = CONFIG.links.residentAdvisor;
  document.getElementById('link-contact').href = 'mailto:' + CONFIG.links.contactEmail;

  // pick one random background image per page load
  const bgLayer = document.getElementById('bg-layer');
  if (CONFIG.images && CONFIG.images.length > 0){
    const choice = CONFIG.images[Math.floor(Math.random() * CONFIG.images.length)];
    const img = document.createElement('img');
    img.src = choice;
    img.alt = "";
    bgLayer.appendChild(img);
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

</body>
</html>
